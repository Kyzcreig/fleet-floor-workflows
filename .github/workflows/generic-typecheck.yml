# Reusable floor component: `type_check` (GENERIC — shell/Makefile/HTML/docs). Honest NOOP: no language
# type checker on a generic repo. Emits `type_check / type_check` = success as strength=noop.
# Internal job name `type_check` is a frozen contract (spec D-12).
name: floor-generic-typecheck

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-type-check-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type_check:
    name: type_check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: generic type_check is a no-op (strength=noop)
        run: echo "::notice::generic floor — type_check is a no-op placeholder (no language type checker) [strength=noop]"
