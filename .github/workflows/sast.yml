# Reusable floor component: `sast` — semgrep at ERROR severity (proven 0-noise on clean Python).
# Language-agnostic (configs are semgrep registry packs). Internal job name `sast` = frozen contract.
name: floor-sast

on:
  workflow_call:
    inputs:
      target:
        description: "Path semgrep scans."
        type: string
        default: "."
      configs:
        description: "Space-separated semgrep --config values."
        type: string
        default: "p/python p/secrets"
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""
      semgrep-version:
        type: string
        default: "1.46.0"

permissions:
  contents: read

concurrency:
  # A reusable workflow's `github.job` is its OWN job id (always `sast`), so two callers in one run
  # still collide. The CALLER passes a unique `concurrency-suffix` (e.g. the caller job name) to keep
  # the groups distinct; default empty preserves single-caller behavior.
  group: floor-sast-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    name: sast
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/workflows/*.yml

      - name: Install semgrep
        env:
          SEMGREP_VERSION: ${{ inputs.semgrep-version }}
        run: pip install "semgrep==$SEMGREP_VERSION"

      - name: Run semgrep (ERROR severity gate)
        env:
          SEMGREP_CONFIGS: ${{ inputs.configs }}
          SEMGREP_TARGET: ${{ inputs.target }}
        run: |
          set -euo pipefail
          CONFIG_ARGS=()
          read -r -a CONFIG_VALUES <<< "$SEMGREP_CONFIGS"
          for c in "${CONFIG_VALUES[@]}"; do CONFIG_ARGS+=("--config=$c"); done
          semgrep "${CONFIG_ARGS[@]}" --severity=ERROR --error --quiet "$SEMGREP_TARGET"
