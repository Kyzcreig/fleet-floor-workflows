# Reusable floor component: `dep_audit` (GENERIC — shell/Makefile/HTML/docs). Honest NOOP: no language
# dependency manifest to audit on a generic repo. Emits `dep_audit / dep_audit` = success as strength=noop.
# Internal job name `dep_audit` is a frozen contract (spec D-12).
name: floor-generic-dep-audit

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-dep-audit-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep_audit:
    name: dep_audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: generic dep_audit is a no-op (strength=noop)
        run: echo "::notice::generic floor — dep_audit is a no-op placeholder (no language dependency manifest) [strength=noop]"
