# Reusable floor component: `type_check` (JS/TS) — tsc --noEmit if a tsconfig exists, else eslint/weak.
# ERROR-gated. Internal job name `type_check` is a frozen contract (spec D-12).
#
# real-vs-weak is path-derivable (matches derive_strength js-ts): a tsconfig.json present -> tsc
# --noEmit runs = real; otherwise eslint if configured (weak) or a green no-op.
name: floor-js-typecheck

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      working-directory:
        type: string
        default: "."
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-type-check-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type_check:
    name: type_check
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.working-directory }}/package-lock.json
            ${{ inputs.working-directory }}/npm-shrinkwrap.json
            ${{ inputs.working-directory }}/package.json
            .github/workflows/*.yml

      - name: Install deps (best-effort, for local tsconfig extends / types)
        run: |
          set -euo pipefail
          if [ -f package-lock.json ]; then npm ci || npm install || true
          elif [ -f pnpm-lock.yaml ]; then corepack enable && pnpm install || true
          elif [ -f yarn.lock ]; then corepack enable && yarn install || true
          elif [ -f package.json ]; then npm install || true
          fi

      - name: Type check (tsc --noEmit if tsconfig, else eslint/weak)
        run: |
          set -euo pipefail
          if [ -f tsconfig.json ]; then
            echo "tsconfig.json present -> tsc --noEmit [strength=real]"
            npx --yes -p typescript@5.9.3 tsc --noEmit
          elif [ -f .eslintrc ] || [ -f .eslintrc.json ] || [ -f .eslintrc.js ] || [ -f eslint.config.js ]; then
            echo "eslint configured -> eslint [strength=weak]"
            npx --yes eslint . || { echo "::error::eslint found problems"; exit 1; }
          else
            echo "::notice::no tsconfig/eslint -> type_check is a green no-op [strength=weak]"
          fi
