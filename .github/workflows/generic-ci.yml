# Reusable floor component: `ci` (GENERIC — shell/Makefile/HTML/docs). Honest NOOP: a generic repo has
# no language test runner, so this emits `ci / ci` = success as a strength=noop placeholder. The real
# tripwires on a generic floor are sast + secret_scan (language-agnostic); ci/type_check/dep_audit are
# deliberate noops -> noop>=2 -> the ARM gate can never clear a generic floor (spec I-A2, floored != armed).
# Internal job name `ci` is a frozen contract (spec D-12) so the compound check-run name matches python/js.
name: floor-generic-ci

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: "."
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-ci-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: generic ci is a no-op (strength=noop)
        run: echo "::notice::generic floor — ci is a no-op placeholder (no language toolchain); real gates are sast + secret_scan [strength=noop]"
