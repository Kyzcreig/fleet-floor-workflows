# Reusable floor component: `ci` — pytest if a tests dir exists, else import-smoke.
# Part of the fleet-floor (greploop posture-B). Called via `uses:` + an immutable SHA.
# Emits a check-run whose internal job name is the literal floor component `ci`
# (frozen contract — renaming this job is a breaking fleet-wide change; see spec D-12).
name: floor-ci

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version for the runner."
        type: string
        default: "3.11"
      working-directory:
        description: "Dir containing the package (pyproject.toml / setup.py)."
        type: string
        default: "."
      tests-path:
        description: "Tests directory (relative to working-directory)."
        type: string
        default: "tests"
      import-name:
        description: "Module to import-smoke when there are no tests (e.g. 'mypkg')."
        type: string
        default: ""
      install:
        description: "Install command; default installs the package editable if installable."
        type: string
        default: ""

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install package
        env:
          INSTALL_CMD: ${{ inputs.install }}
        run: |
          python -m pip install --upgrade pip
          if [ -n "$INSTALL_CMD" ]; then
            echo "custom install: $INSTALL_CMD"
            eval "$INSTALL_CMD"
          elif [ -f pyproject.toml ] || [ -f setup.py ] || [ -f setup.cfg ]; then
            pip install -e . || pip install . || echo "::warning::package not pip-installable; continuing for import/tests"
            # A package can still declare its TEST deps only in a requirements file (not in
            # the package metadata) — install the root requirements.txt too if present.
            if [ -f requirements.txt ]; then
              echo "also installing requirements.txt (test deps)"
              pip install -r requirements.txt || echo "::warning::requirements.txt install had problems; continuing"
            fi
          elif [ -f requirements.txt ]; then
            # No package metadata but a requirements.txt — the common "script repo + tests" shape.
            # Without this the suite imports its deps (fastapi/hassil/etc.) and CI goes red for the
            # wrong reason. (Fleet-floor v2 fix, 2026-06-30.)
            echo "no package metadata; installing requirements.txt"
            pip install -r requirements.txt || echo "::warning::requirements.txt install had problems; continuing"
          else
            echo "no python package metadata; nothing to install"
          fi
          pip install pytest

      - name: Run tests (pytest) or import-smoke
        env:
          TESTS: ${{ inputs.tests-path }}
          IMPORT: ${{ inputs.import-name }}
        run: |
          set -euo pipefail
          if [ -n "$TESTS" ] && [ -d "$TESTS" ] && find "$TESTS" \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
            echo "tests present -> pytest ($TESTS) [strength=real]"
            python -m pytest "$TESTS" -q
          elif [ -z "$IMPORT" ]; then
            echo "::notice::no tests and no import-name given; ci is a green no-op [strength=weak]"
            exit 0
          else
            echo "no tests -> import-smoke: import $IMPORT [strength=weak]"
            python -c "import importlib; importlib.import_module('$IMPORT'); print('import OK:', '$IMPORT')"
          fi
