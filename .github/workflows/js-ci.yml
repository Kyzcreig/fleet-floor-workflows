# Reusable floor component: `ci` (JS/TS) — runs tests if a test dir/file exists, else import/build-smoke.
# Part of the fleet-floor (greploop posture-B). Called via `uses:` + an immutable SHA.
# Emits a check-run whose internal job name is the literal floor component `ci` (frozen contract).
#
# 🔴 D-2 fix (spec Pass-1 Blocker 2): the real-vs-weak decision keys off a PATH signal — "does a test
# directory / *.test.* file exist?" — the SAME signal derive_strength(lang="js-ts") sees in a tree
# listing. NOT the package.json `test` script (content, invisible to the tree read), so the predictor
# and this workflow can never drift. A contract test binds them on js-sample (AC-P4b-4).
name: floor-js-ci

on:
  workflow_call:
    inputs:
      node-version:
        description: "Node version for the runner."
        type: string
        default: "20"
      working-directory:
        description: "Dir containing package.json."
        type: string
        default: "."
      install:
        description: "Install command; default = npm ci if a lockfile, else npm install, else skip."
        type: string
        default: ""
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-ci-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    # A hung test (a server that never closes, a port wait with no timeout) must not burn the 6h
    # default — fail the floor at 20 min so provisioning aborts cleanly instead of polling forever.
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.working-directory }}/package-lock.json
            ${{ inputs.working-directory }}/npm-shrinkwrap.json
            ${{ inputs.working-directory }}/package.json
            .github/workflows/*.yml

      - name: Install deps
        env:
          INSTALL_CMD: ${{ inputs.install }}
        run: |
          set -euo pipefail
          if [ -n "$INSTALL_CMD" ]; then
            echo "custom install: $INSTALL_CMD"
            eval "$INSTALL_CMD"
          elif [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci || npm install || echo "::warning::npm install had problems; continuing"
          elif [ -f pnpm-lock.yaml ]; then
            corepack enable && pnpm install --frozen-lockfile || pnpm install || echo "::warning::pnpm install had problems"
          elif [ -f yarn.lock ]; then
            corepack enable && yarn install --frozen-lockfile || yarn install || echo "::warning::yarn install had problems"
          elif [ -f package.json ]; then
            npm install || echo "::warning::npm install had problems; continuing"
          else
            echo "no package.json; nothing to install"
          fi

      - name: Run tests (path-signal) or smoke
        run: |
          set -euo pipefail
          # PATH signal (matches derive_strength js-ts): a conventional test dir OR a *.test.*/*.spec.*
          # file outside vendored trees -> real. Detection MUST be deterministic and pipefail-safe:
          # the old `find . | grep -q .` raced (grep -q closes the pipe on first match; find, still
          # walking a NESTED node_modules the `-path ./node_modules` prune missed, took SIGPIPE -> 141
          # -> pipefail flipped the condition FALSE -> wrong import-smoke branch on a repo WITH tests).
          # Fixes: prune ALL node_modules/.git/dist/build; `-print -quit` so find exits 0 itself (no
          # pipe, no SIGPIPE); capture to a var.
          have_tests=0
          for d in test tests __tests__ src/__tests__ spec; do
            if [ -d "$d" ]; then have_tests=1; break; fi
          done
          if [ "$have_tests" = 0 ]; then
            found=$(find . \( -path '*/node_modules' -o -path '*/.git' -o -path '*/dist' -o -path '*/build' -o -path '*/.next' \) -prune \
                      -o \( -name '*.test.js' -o -name '*.test.ts' -o -name '*.test.jsx' -o -name '*.test.tsx' \
                            -o -name '*.test.mjs' -o -name '*.test.cjs' \
                            -o -name '*.spec.js' -o -name '*.spec.ts' -o -name '*.spec.jsx' -o -name '*.spec.tsx' \) \
                      -print -quit 2>/dev/null || true)
            [ -n "$found" ] && have_tests=1
          fi
          if [ "$have_tests" = 1 ]; then
            echo "tests present -> running tests [strength=real]"
            if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.test?0:1)" 2>/dev/null; then
              npm test
            else
              # No test script -> use the zero-dep built-in node test runner over the test dir(s).
              echo "no package.json test script; using node --test"
              node --test
            fi
          else
            echo "::notice::no tests -> import/build smoke [strength=weak]"
            if [ -f package.json ] && node -e "process.exit(require('./package.json').scripts?.build?0:1)" 2>/dev/null; then
              npm run build
            elif [ -f package.json ] && node -e "process.exit(require('./package.json').main?0:1)" 2>/dev/null; then
              # Import smoke = "does main load without throwing?". A library imports and returns (rc 0);
              # a SERVER entrypoint starts listening and never returns. Both = loaded OK. Bound it with a
              # timeout so a long-running entrypoint can't hang CI for 6h: rc 0 (returned) or 124/143
              # (still alive at the deadline = loaded into a long-running process) = pass; any OTHER
              # non-zero = threw during require = real failure.
              set +e
              timeout --preserve-status 60 node -e "require('./' + require('./package.json').main); console.log('import OK')"
              rc=$?
              set -e
              if [ "$rc" -eq 0 ] || [ "$rc" -eq 124 ] || [ "$rc" -eq 143 ]; then
                echo "import smoke OK (rc=$rc; 124/143 = entrypoint started a long-running process and loaded cleanly)"
              else
                echo "::error::import smoke FAILED (rc=$rc) — main module threw on require"
                exit 1
              fi
            else
              echo "no tests, no build, no main; ci is a green no-op [strength=weak]"
            fi
          fi
