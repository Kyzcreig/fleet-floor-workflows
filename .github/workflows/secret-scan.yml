# Reusable floor component: `secret_scan` — gitleaks, DIFF-SCOPED & range-independent.
# Hardened (greploop phase-3): scan the exact changed-file BYTES at HEAD_SHA via `git show` +
# `gitleaks --no-git`, never a fragile base..head range, never full-tree (a fork inherits ~768
# upstream false positives). Internal job name `secret_scan` = frozen contract (spec D-12).
name: floor-secret-scan

on:
  workflow_call:
    inputs:
      gitleaks-version:
        type: string
        default: "8.18.4"

permissions:
  contents: read

concurrency:
  group: floor-secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret_scan:
    name: secret_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          VER="${{ inputs.gitleaks-version }}"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar xzf gl.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: Compute changed files (merge-base diff, range-independent)
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
            HEAD_SHA="${{ github.sha }}"
          fi
          git fetch -q origin "$BASE_SHA" 2>/dev/null || true
          git fetch -q origin "$HEAD_SHA" 2>/dev/null || true
          if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null && git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null; then
            MB="$(git merge-base "$BASE_SHA" "$HEAD_SHA" 2>/dev/null || echo "$BASE_SHA")"
            git diff --name-only --diff-filter=ACMR "$MB" "$HEAD_SHA" > /tmp/changed.txt || true
          else
            echo "base unavailable -> FULL-CONTENT scan of HEAD_SHA"
            git ls-tree -r --name-only "$HEAD_SHA" > /tmp/changed.txt || true
          fi
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "----- files to scan ($(wc -l < /tmp/changed.txt)) -----"; head -50 /tmp/changed.txt

      - name: Gitleaks (scan changed-file bytes at HEAD_SHA — range-independent)
        run: |
          if [ ! -s /tmp/changed.txt ]; then
            echo "no files to scan; pass"
            exit 0
          fi
          HEAD_SHA="${{ steps.changed.outputs.head_sha }}"
          SCRATCH="$(mktemp -d)"
          trap 'rm -rf "$SCRATCH"' EXIT
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            mkdir -p "$SCRATCH/$(dirname "$f")"
            git show "${HEAD_SHA}:$f" > "$SCRATCH/$f" 2>/dev/null || true
          done < /tmp/changed.txt
          echo "scanning $(find "$SCRATCH" -type f | wc -l) file(s) at HEAD_SHA with gitleaks --no-git"
          gitleaks detect \
            --source "$SCRATCH" \
            --no-git \
            --no-banner \
            --redact \
            --exit-code 1
