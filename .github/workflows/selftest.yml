# Self-test: exercises all 5 reusable floor workflows against the in-repo clean `sample/` package
# on every push/PR. This is the AC1 proof — the reusable workflows must go GREEN on real CI, and the
# compound check-run names this emits (`<caller-job> / <reusable-job>`) are what a floored repo's
# branch-protection + FLOOR_MAP must use (spec B-O2-3 / D-12). DO NOT delete: it's the floor's own floor.
name: floor-selftest

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/python-ci.yml
    with:
      working-directory: sample
      tests-path: tests
      import-name: sample_pkg
      concurrency-suffix: py

  type_check:
    uses: ./.github/workflows/python-typecheck.yml
    with:
      working-directory: sample
      target: src
      concurrency-suffix: py

  sast:
    uses: ./.github/workflows/sast.yml
    with:
      target: sample
      concurrency-suffix: py

  secret_scan:
    uses: ./.github/workflows/secret-scan.yml
    with:
      concurrency-suffix: py

  dep_audit:
    uses: ./.github/workflows/python-dep-audit.yml
    with:
      working-directory: sample
      concurrency-suffix: py

  # --- JS/TS floor self-test (Phase 4b) over the clean js-sample/ package ---
  # These caller jobs are js_-prefixed so their compound check names don't collide with the python
  # selftest jobs above. A FLOORED js repo's caller (render_caller lang="js-ts") names its jobs `ci`/
  # `type_check`/`dep_audit` -> emits `ci / ci` etc, the canonical names the registry credits.
  js_ci:
    uses: ./.github/workflows/js-ci.yml
    with:
      working-directory: js-sample
      concurrency-suffix: js

  js_type_check:
    uses: ./.github/workflows/js-typecheck.yml
    with:
      working-directory: js-sample
      concurrency-suffix: js

  js_sast:
    uses: ./.github/workflows/sast.yml
    with:
      target: js-sample
      configs: "p/javascript p/typescript p/secrets"
      concurrency-suffix: js

  js_dep_audit:
    uses: ./.github/workflows/js-dep-audit.yml
    with:
      working-directory: js-sample
      concurrency-suffix: js

  # --- GENERIC floor self-test (Track A) over the clean generic-sample/ (shell+Makefile+HTML) ---
  # generic_-prefixed so compound names don't collide; a floored generic repo's caller names its jobs
  # ci/type_check/dep_audit -> emits `ci / ci` etc (the canonical names the registry credits). ci/
  # type_check/dep_audit are honest noops; sast/secret_scan are the real language-agnostic tripwires.
  generic_ci:
    uses: ./.github/workflows/generic-ci.yml
    with:
      working-directory: generic-sample
      concurrency-suffix: generic

  generic_type_check:
    uses: ./.github/workflows/generic-typecheck.yml
    with:
      working-directory: generic-sample
      concurrency-suffix: generic

  generic_dep_audit:
    uses: ./.github/workflows/generic-dep-audit.yml
    with:
      working-directory: generic-sample
      concurrency-suffix: generic

  generic_sast:
    uses: ./.github/workflows/sast.yml
    with:
      target: generic-sample
      configs: "p/secrets"
      concurrency-suffix: generic

  generic_secret_scan:
    uses: ./.github/workflows/secret-scan.yml
    with:
      concurrency-suffix: generic

  # --- RECURRING NEGATIVE selftest (AC-A7 / pass-3 blocker 2): the tripwires must have TEETH ---
  # A green-on-clean selftest proves the floor RUNS, not that it still CATCHES. This job runs the SAME
  # scanners (pinned versions) over generic-sample-redteam/ (a committed always-present bad fixture with
  # a format-valid, NON-LIVE test key) and asserts they go RED. If a semgrep/gitleaks drift or a botched
  # edit silently stops the tripwire firing, THIS job goes red -> a coverage regression surfaces as CI
  # red, not a silent hollowing (the exact hollow-check pathology, caught in our own sample).
  generic_negative_teeth:
    name: generic_negative_teeth
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: .github/workflows/*.yml

      # Pin MUST match render_caller/sast.yml's measured semgrep-version (D-A6, 2026-06-30 measurement).
      - name: Assert pinned semgrep version == measured 1.46.0
        run: |
          grep -q 'default: "1.46.0"' .github/workflows/sast.yml

      - name: Install pinned scanners
        run: |
          set -euo pipefail
          pip install "semgrep==1.46.0"
          VER="8.18.4"
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" -o gl.tgz
          tar xzf gl.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/

      - name: sast MUST go RED on the redteam fixture (semgrep p/secrets)
        run: |
          set -euo pipefail
          n=$(semgrep --config=p/secrets --json --quiet generic-sample-redteam 2>/dev/null | python3 -c "import json,sys;print(len(json.load(sys.stdin).get('results',[])))")
          echo "semgrep findings on redteam fixture: $n"
          if [ "$n" -lt 1 ]; then echo "::error::sast tripwire is HOLLOW — semgrep found 0 on the planted key"; exit 1; fi

      - name: secret_scan MUST go RED on the redteam fixture (gitleaks)
        run: |
          set -euo pipefail
          if gitleaks detect --source generic-sample-redteam --no-git --no-banner --redact --exit-code 1; then
            echo "::error::secret_scan tripwire is HOLLOW — gitleaks found 0 on the planted key"; exit 1
          fi
          echo "gitleaks correctly flagged the planted key (RED)"

      - name: negative teeth OK
        run: echo "::notice::generic floor tripwires still have teeth (sast + secret_scan both RED on the planted key)"

