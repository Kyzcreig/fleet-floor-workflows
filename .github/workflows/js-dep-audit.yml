# Reusable floor component: `dep_audit` (JS/TS) — npm/pnpm/yarn audit at high severity if a lockfile.
# DETERMINISTIC: only audits an EXPLICIT lockfile; no lockfile -> present+green NOOP (recorded honestly,
# spec D-9 — a noop can't make a repo auto-merge-eligible). Internal job name `dep_audit` = frozen.
name: floor-js-dep-audit

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: "20"
      working-directory:
        type: string
        default: "."
      audit-level:
        description: "npm audit severity gate."
        type: string
        default: "high"
      concurrency-suffix:
        description: "Disambiguator when one workflow calls this reusable workflow more than once."
        type: string
        default: ""

permissions:
  contents: read

concurrency:
  group: floor-dep-audit-${{ github.workflow }}-${{ inputs.concurrency-suffix }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dep_audit:
    name: dep_audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: |
            ${{ inputs.working-directory }}/package-lock.json
            ${{ inputs.working-directory }}/npm-shrinkwrap.json
            ${{ inputs.working-directory }}/package.json
            .github/workflows/*.yml

      - name: Audit dependencies (explicit lockfile only)
        env:
          LEVEL: ${{ inputs.audit-level }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            echo "npm lockfile present -> npm audit --audit-level=$LEVEL [strength=real]"
            npm audit --audit-level="$LEVEL"
          elif [ -f pnpm-lock.yaml ]; then
            echo "pnpm lockfile present -> pnpm audit [strength=real]"
            corepack enable
            pnpm audit --audit-level "$LEVEL"
          elif [ -f yarn.lock ]; then
            echo "yarn lockfile present -> yarn npm audit [strength=real]"
            corepack enable
            yarn npm audit --severity "$LEVEL"
          else
            echo "::notice::no lockfile -> dep_audit is a green no-op [strength=noop]"
            exit 0
          fi
